# ==========================================
# F1 Streaming System — Docker Compose
# ==========================================
# Full stack: Zookeeper, Kafka, MySQL, Producer, Consumer, Backend, Prometheus, Grafana
#
# Usage:
#   docker-compose up -d                # Start all services
#   docker-compose up -d --build        # Rebuild and start
#   docker-compose logs -f producer     # Tail producer logs
#   docker-compose down                 # Stop all services
# ==========================================

services:
  # ==========================================
  # Infrastructure
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: f1-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: f1-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: f1-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Sreya@2202}
      MYSQL_DATABASE: ${DB_NAME:-f1}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-Sreya@2202}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==========================================
  # Application Services
  # ==========================================
  producer:
    build: ./producer
    container_name: f1-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENF1_BASE_URL: https://api.openf1.org/v1
      POLL_INTERVAL_SECONDS: 10
      LOG_LEVEL: INFO
    restart: on-failure:5

  consumer:
    build: ./consumer
    container_name: f1-consumer
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: f1-consumer-group
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-Sreya@2202}
      DB_NAME: ${DB_NAME:-f1}
      LOG_LEVEL: INFO
    restart: on-failure:5

  backend:
    build: ./backend
    container_name: f1-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-Sreya@2202}
      DB_NAME: ${DB_NAME:-f1}
      PORT: 3001
      CACHE_TTL_SECONDS: 30
      LOG_LEVEL: info
    restart: on-failure:5

  # ==========================================
  # Monitoring (Optional)
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: f1-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.1.5
    container_name: f1-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: f1admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  mysql_data:
  grafana_data:
