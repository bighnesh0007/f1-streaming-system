# Prometheus Configuration for F1 Streaming System
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'f1-backend'
    static_configs:
      - targets: ['backend:3001']
    metrics_path: '/api/health'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
